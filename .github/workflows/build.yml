name: Build Server Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify lang files are synced
        shell: pwsh
        run: pwsh -NoProfile -File ./tools/sync_lang_files.ps1 -Check

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload built jar
        uses: actions/upload-artifact@v6
        with:
          name: WaystoneInjectorServer
          path: build/libs/*.jar
